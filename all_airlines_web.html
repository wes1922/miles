<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Global Airlines Award Release Hub</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --primary: #f43f5e;
      --primary-hover: #e11d48;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #facc15;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-color);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      background-image: 
        radial-gradient(at 0% 0%, rgba(244, 63, 94, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(250, 204, 21, 0.1) 0px, transparent 50%);
    }
    .container {
      width: 90%;
      max-width: 650px;
      margin-top: 5vmin;
      margin-bottom: 5vmin;
      padding: 2rem;
      background: var(--card-bg);
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    h1 {
      font-size: 1.6rem;
      margin-bottom: 0.5rem;
      text-align: center;
      color: #fff;
    }
    p {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 2rem;
    }
    .version-tag {
      display: inline-block;
      background: rgba(255,255,255,0.1);
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      color: #cbd5e1;
      margin-bottom: 1rem;
    }
    .status-container {
      margin: 1.5rem 0;
      display: none;
    }
    .status-title-box {
      padding: 1rem 1.5rem;
      background: linear-gradient(135deg, rgba(250, 204, 21, 0.2), rgba(245, 158, 11, 0.1));
      border-left: 4px solid var(--accent);
      border-radius: 10px;
      font-size: 1.25rem;
      font-weight: bold;
      color: #fff;
      margin-bottom: 1.5rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    }
    label {
      display: block;
      margin-top: 1.2rem;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    select, input[type="date"] {
      width: 100%;
      box-sizing: border-box;
      padding: 1rem;
      font-size: 1.05rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.6);
      color: var(--text-main);
      color-scheme: dark;
      transition: border-color 0.2s;
    }
    select:focus, input[type="date"]:focus {
      outline: none;
      border-color: var(--primary);
    }
    .btn-calc {
      margin-top: 2rem;
      width: 100%;
      padding: 1rem;
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--primary-hover));
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(244, 63, 94, 0.3);
      transition: transform 0.1s, box-shadow 0.2s;
    }
    .btn-calc:hover {
      box-shadow: 0 6px 20px rgba(244, 63, 94, 0.4);
    }
    .btn-calc:active {
      transform: scale(0.98);
    }
    .result-card {
      margin-top: 2rem;
      padding: 1.5rem;
      background: rgba(15, 23, 42, 0.8);
      border-radius: 12px;
      border: 1px solid rgba(244, 63, 94, 0.3);
      display: none;
    }
    pre {
      font-family: inherit;
      white-space: pre-wrap;
      color: var(--text-main);
      font-size: 0.92rem;
      line-height: 1.6;
      margin: 0;
    }
    .btn-ics {
      margin-top: 1rem;
      width: 100%;
      padding: 0.8rem;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-ics:hover {
      background: rgba(255, 255, 255, 0.3);
    }
    .footer-note {
      text-align: center;
      margin-top: 1.5rem;
      color: #475569;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🌍 全球航空常客計畫 哩程放票推算器</h1>
    <div style="text-align: center;"><span class="version-tag">最新版本：v3.3 (Card-Based UI Engine)</span></div>
    <p>統整全球各大航空，精準跨國時區自動轉換</p>

    <label for="airline">選擇航空公司 / 哩程計畫</label>
    <select id="airline" onchange="handleAirlineChange()"></select>

    <div class="status-container" id="info-box"></div>

    <label for="departure" style="margin-top: 2rem;">設定目標出發日期 (去程)</label>
    <input type="date" id="departure" />
    <button class="btn-calc" onclick="handleCalculate()">立即推算精確放票時間</button>

    <div class="result-card" id="result-card"></div>
    
    <div class="footer-note">
      Build 2026.04.08 | Global Airlines Database Engine v3.3
    </div>
  </div>

  <script>
    const airlines = [
      // === 星空聯盟 (Star Alliance) ===
      { alliance: "星空聯盟 (Star Alliance)", id: "br", name: "EVA Air 長榮航空 (Infinity MileageLands)", days: 360, confirmed: true, partnerConfirmed: false, tz: "Asia/Taipei", hour: 8 },
      { alliance: "星空聯盟 (Star Alliance)", id: "oz", name: "Asiana Club", days: 361, confirmed: false, partnerConfirmed: false, tz: "Asia/Seoul", hour: 0 },
      { alliance: "星空聯盟 (Star Alliance)", id: "av", name: "Avianca Lifemiles", days: 360, confirmed: false, partnerConfirmed: false, tz: "UTC", hour: 0, note: "推算邏輯：通常為每天 UTC 00:00。" },
      { alliance: "星空聯盟 (Star Alliance)", id: "lh", name: "Lufthansa Miles & More", days: 360, confirmed: false, partnerConfirmed: false, tz: "Europe/Berlin", hour: 0, note: "只會在出發日前 15 日之內，釋出頭等艙哩程機位給予夥伴航空計畫兌換。" },
      { alliance: "星空聯盟 (Star Alliance)", id: "ac", name: "Air Canada Aeroplan", days: 355, confirmed: false, partnerConfirmed: false, tz: "America/Toronto", hour: 0 },
      { alliance: "星空聯盟 (Star Alliance)", id: "nh", name: "All Nippon Airways (ANA)", days: 355, confirmed: false, partnerDays: 356, partnerConfirmed: true, tz: "Asia/Tokyo", hour: 9, 
        note: "ANA 自家與外家夥伴的放票基準日有別。\n另請注意：每家外家航空能看到的遠期日期不一定相同。",

      },
      { alliance: "星空聯盟 (Star Alliance)", id: "sq", name: "Singapore Airlines KrisFlyer", days: 355, confirmed: false, partnerConfirmed: false, tz: "Asia/Singapore", hour: 8, 
        note: "例外提醒：美國出發回新加坡航班會依美國當地午夜釋出(如EST及PST會影響幾個小時的偏移)。<br/>長程商務/頭等幾乎僅限自家會員兌換。"
      },
      { alliance: "星空聯盟 (Star Alliance)", id: "ua", name: "United MileagePlus", days: 337, confirmed: false, partnerConfirmed: false, tz: "America/Chicago", hour: 0 },
      
      // === 天合聯盟 (SkyTeam) ===
      { alliance: "天合聯盟 (SkyTeam)", id: "ci", name: "China Airlines 中華航空 (Dynasty Flyer)", days: 361, confirmed: true, partnerConfirmed: false, tz: "Asia/Taipei", hour: 8 },
      { alliance: "天合聯盟 (SkyTeam)", id: "ke", name: "Korean Air SkyPass", days: 361, confirmed: false, partnerConfirmed: false, tz: "Asia/Seoul", hour: 0 },
      { alliance: "天合聯盟 (SkyTeam)", id: "af", name: "Air France-KLM Flying Blue", days: 359, confirmed: false, partnerConfirmed: false, tz: "Europe/Paris", hour: 0, note: "推算邏輯：巴黎當地 00:00。<br/>通常釋出較多機位，優先保留給自家的「藍天飛行計劃」(Flying Blue) 會員。" },
      { alliance: "天合聯盟 (SkyTeam)", id: "dl", name: "Delta SkyMiles", days: 331, confirmed: false, partnerConfirmed: false, tz: "America/New_York", hour: 0 },
      { alliance: "天合聯盟 (SkyTeam)", id: "vs", name: "Virgin Atlantic Flying Club", days: 331, confirmed: false, partnerConfirmed: false, tz: "Europe/London", hour: 5, note: "推算邏輯：英國時間 (GMT/BST) 凌晨 05:00 釋出。" },

      // === 寰宇一家 (Oneworld) ===
      { alliance: "寰宇一家 (Oneworld)", id: "ay", name: "Finnair Plus", days: 361, confirmed: false, partnerConfirmed: false, tz: "Europe/Helsinki", hour: 0 },
      { alliance: "寰宇一家 (Oneworld)", id: "qr", name: "Qatar Airways Privilege Club", days: 361, confirmed: false, partnerConfirmed: false, tz: "Asia/Qatar", hour: 0 },
      { alliance: "寰宇一家 (Oneworld)", id: "cx", name: "Cathay Pacific Asia Miles", days: 360, confirmed: false, partnerConfirmed: true, tz: "Asia/Hong_Kong", hour: 8 },
      { alliance: "寰宇一家 (Oneworld)", id: "jl", name: "Japan Airlines Mileage Bank (JAL)", days: 360, confirmed: false, partnerConfirmed: false, tz: "Asia/Tokyo", hour: 10, 
        note: "<strong>⚠️ [外家/夥伴航空放票高度不確定性]</strong><br/>JMB 夥伴航空、Oneworld、捷星等每家規則皆不一定！<br/>例如：AA(美航)目前僅能看 331 天後；國泰(CX) 單程香港與單程東京放出的遠期日期甚至有落差。<br/><br/>[規律/預訂]<br/>>354 天：固定釋出 1 頭等。<br/>46~353 天：頭等每 14 天出現。<br/>網站需 48H 前；電話 24H 前完成。" 
      },
      { alliance: "寰宇一家 (Oneworld)", id: "ba", name: "British Airways Executive Club", days: 355, confirmed: false, partnerConfirmed: false, tz: "Europe/London", hour: 0 },
      { alliance: "寰宇一家 (Oneworld)", id: "qf", name: "Qantas Frequent Flyer", days: 353, confirmed: false, partnerConfirmed: false, tz: "Australia/Sydney", hour: 0 },
      { alliance: "寰宇一家 (Oneworld)", id: "as", name: "Alaska Mileage Plan", days: 331, confirmed: false, partnerConfirmed: true, tz: "America/Los_Angeles", hour: 0, note: "備註：原330天，嚴格推算互換為331天。" },
      { alliance: "寰宇一家 (Oneworld)", id: "aa", name: "American AAdvantage", days: 331, confirmed: false, partnerConfirmed: false, tz: "America/Chicago", hour: 0 },
      { alliance: "寰宇一家 (Oneworld)", id: "ib", name: "Iberia Plus", days: 330, confirmed: false, partnerConfirmed: false, tz: "Europe/Madrid", hour: 0 },

      // === 獨立 / 其他 (Non-Alliance) ===
      { alliance: "獨立計畫 / 其他", id: "jx", name: "Starlux Airlines 星宇航空 (COSMILE)", days: 360, confirmed: true, partnerConfirmed: false, tz: "Asia/Taipei", hour: 8 },
      { alliance: "獨立計畫 / 其他", id: "ey", name: "Etihad Guest", days: 330, confirmed: false, partnerConfirmed: false, tz: "Asia/Dubai", hour: 0 },
      { alliance: "獨立計畫 / 其他", id: "ha", name: "Hawaiian Airlines", days: 330, confirmed: false, partnerConfirmed: false, tz: "Pacific/Honolulu", hour: 0 },
      { alliance: "獨立計畫 / 其他", id: "ek", name: "Emirates Skywards", days: 328, confirmed: false, partnerConfirmed: false, tz: "Asia/Dubai", hour: 0, note: "並不會釋出頭等艙機位給予除了澳洲航空 (Qantas) 以外的合作夥伴航空，透過自家哩程計畫兌換機會最高。" }
    ];

    function pad(num) { return String(num).padStart(2, '0'); }

    function getTZTime(year, monthIndex, day, timeZone, targetHour) {
      let guess = new Date(Date.UTC(year, monthIndex, day, 12, 0, 0));
      let parts = new Intl.DateTimeFormat('en-US', {
        timeZone: timeZone, 
        timeZoneName: 'longOffset',
      }).formatToParts(guess);
      let tzOffsetStr = parts.find(p => p.type === 'timeZoneName').value;
      let offsetHours = 0, offsetMinutes = 0;
      if (tzOffsetStr !== "GMT") {
         const match = tzOffsetStr.match(/GMT([+-])(\d+):(\d+)/);
         if (match) {
            let sign = match[1] === '-' ? -1 : 1;
            offsetHours = parseInt(match[2], 10) * sign;
            offsetMinutes = parseInt(match[3], 10) * sign;
         }
      }
      return new Date(Date.UTC(year, monthIndex, day, targetHour - offsetHours, -offsetMinutes, 0));
    }

    function formatToYMDHMS(d, tz) {
      const options = { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
      if(tz) options.timeZone = tz;
      let s = new Intl.DateTimeFormat('en-CA', options).format(d);
      s = s.replace(',', '');
      if(s.includes(' 24:')) s = s.replace(' 24:', ' 00:');
      return s;
    }

    window.onload = function() {
      const sel = document.getElementById('airline');
      let html = '<option value="" disabled selected>請選擇一家航空...</option>';
      let currentAlliance = "";
      airlines.forEach((al, index) => {
        if (al.alliance !== currentAlliance) {
          if (currentAlliance !== "") html += `</optgroup>`;
          currentAlliance = al.alliance;
          html += `<optgroup label="${currentAlliance}">`;
        }
        html += `<option value="${index}">${al.name} (${al.days} 天)</option>`;
      });
      if (currentAlliance !== "") html += `</optgroup>`;
      sel.innerHTML = html;
    };

    function handleAirlineChange() {
      const idx = document.getElementById('airline').value;
      if(idx === "") return;
      const al = airlines[idx];
      const infoEl = document.getElementById('info-box');
      
      let noteHtml = al.note ? `<div style="margin-top:1.5rem; font-size:0.95em; color:#facc15; background:rgba(0,0,0,0.4); padding:1rem; border-radius:12px; line-height:1.6; border: 1px solid rgba(250,204,21,0.2);"><strong>💡 深度經驗與規律</strong><br/>${al.note}</div>` : '';

      const routes = [];
      const pDays = al.partnerDays || al.days;
      const pTz   = al.partnerTz || al.tz;
      const pHour = al.partnerHour !== undefined ? al.partnerHour : al.hour;
      const pConf = al.partnerConfirmed || false;
      const oConf = al.confirmed || false;

      routes.push({ type: 'own', name: "自家執飛航班 (Own Metal)", days: al.days, tz: al.tz, hour: al.hour, confirmed: oConf });
      routes.push({ type: 'partner', name: "外家/聯盟夥伴航班 (依各外家判定為主)", days: pDays, tz: pTz, hour: pHour, confirmed: pConf });

      // Title Card
      let innerContent = `<div class="status-title-box">🏁 ${al.name}</div>`;

      routes.forEach((route, rIdx) => {
          let routeColorBg = route.type === 'own' ? 'rgba(56, 189, 248, 0.15)' : 'rgba(167, 139, 250, 0.15)';
          let routeColorBorder = route.type === 'own' ? 'rgba(56, 189, 248, 0.5)' : 'rgba(167, 139, 250, 0.5)';
          let routeColorText = route.type === 'own' ? '#bae6fd' : '#e9d5ff';
          let routeIcon = route.type === 'own' ? '✈️' : '🤝';

          let routeLabel = `<div style="margin-bottom:0.8rem; padding:0.4rem 0.8rem; background:rgba(0,0,0,0.3); border-radius:6px; color:${routeColorText}; font-weight:bold; display:inline-block;">${routeIcon} ${route.name}</div>`;
          
          let confirmedHtml = route.confirmed ? 
            `<span style="display:inline-block; margin-left:8px; margin-bottom:4px; padding:2px 8px; background:rgba(16, 185, 129, 0.15); color:#34d399; border-radius:6px; font-size:0.75em; border:1px solid rgba(16,185,129,0.3);">✅ 已確認精確時點</span>` : 
            `<span style="display:inline-block; margin-left:8px; margin-bottom:4px; padding:2px 8px; background:rgba(244, 63, 94, 0.15); color:#fb7185; border-radius:6px; font-size:0.75em; border:1px solid rgba(244,63,94,0.3);">⚠️ 未確認精確時間 (約略推估)</span>`;

          let tzDateStr = new Date().toLocaleString('en-US', {timeZone: route.tz === 'UTC' ? 'UTC' : route.tz});
          let ptDate = new Date(tzDateStr);
          let hqYear = ptDate.getFullYear();
          let hqMonth = ptDate.getMonth();
          let hqDay = ptDate.getDate();
          
          let targetHour = route.hour || 0;
          let todaysReleaseAbs = getTZTime(hqYear, hqMonth, hqDay, route.tz === 'UTC' ? 'UTC' : route.tz, targetHour);
          
          let latestReleaseBaseDay, nextReleaseBaseDay, nextReleaseAbs;
          if (Date.now() >= todaysReleaseAbs.getTime()) {
            latestReleaseBaseDay = new Date(hqYear, hqMonth, hqDay);
            nextReleaseBaseDay = new Date(hqYear, hqMonth, hqDay + 1);
            nextReleaseAbs = getTZTime(hqYear, hqMonth, hqDay + 1, route.tz === 'UTC' ? 'UTC' : route.tz, targetHour);
          } else {
            latestReleaseBaseDay = new Date(hqYear, hqMonth, hqDay - 1);
            nextReleaseBaseDay = new Date(hqYear, hqMonth, hqDay);
            nextReleaseAbs = todaysReleaseAbs;
          }
          
          let bookableFlight = new Date(latestReleaseBaseDay);
          bookableFlight.setDate(bookableFlight.getDate() + route.days);
          
          let nextBatchFlight = new Date(nextReleaseBaseDay);
          nextBatchFlight.setDate(nextBatchFlight.getDate() + route.days);
          
          let nextTwStr = formatToYMDHMS(nextReleaseAbs, 'Asia/Taipei');

          let shortTzStr = route.tz;
          if (route.tz !== 'UTC') {
            let shortTzParts = new Intl.DateTimeFormat('en-US', {timeZone: route.tz, timeZoneName: 'short'}).formatToParts(nextReleaseAbs);
            shortTzStr = shortTzParts.find(p => p.type === 'timeZoneName')?.value || route.tz.split('/')[1];
          }

          let blockStyle = `margin-bottom: 1.5rem; padding: 1.5rem; background: ${routeColorBg}; border-top: 3px solid ${routeColorBorder}; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);`;

          innerContent += `
            <div style="${blockStyle}">
                ${routeLabel} ${confirmedHtml}<br/>
                推算基準：提早 <strong style="color:#fff; font-size:1.1em;">${route.days}</strong> 天 <br/>
                換算時區範圍：<strong style="color:#fff;">${route.tz.replace('_', ' ')}</strong> 當地 <strong style="color:#fff;">${pad(targetHour)}:00</strong> (季節縮寫：${shortTzStr})
                
                <div style="margin-top: 1.2rem; padding-top: 1.2rem; border-top: 1px dashed rgba(255,255,255,0.2);">
                    👉 近期最遠可訂：<strong style="color:white; font-size:1.2em;">${bookableFlight.getFullYear()}-${pad(bookableFlight.getMonth()+1)}-${pad(bookableFlight.getDate())}</strong><br/>
                    <div style="color:rgba(255,255,255,0.7); font-size: 0.85em; margin-top: 0.4rem;">(下波在台灣時間 ${nextTwStr} 釋出 ${nextBatchFlight.getFullYear()}-${pad(nextBatchFlight.getMonth()+1)}-${pad(nextBatchFlight.getDate())} )</div>
                </div>
            </div>
          `;
      });
      
      innerContent += noteHtml;

      infoEl.innerHTML = innerContent;
      infoEl.style.display = 'block';
      document.getElementById('result-card').style.display = 'none';
    }

    function handleCalculate() {
      const idx = document.getElementById('airline').value;
      const departureVal = document.getElementById('departure').value;
      if(idx === "" || !departureVal) {
        alert("請確認已選擇航空公司並填寫目標出發日期！");
        return;
      }
      
      const al = airlines[idx];
      const [year, month, day] = departureVal.split('-');
      
      const routes = [];
      const pDays = al.partnerDays || al.days;
      const pTz   = al.partnerTz || al.tz;
      const pHour = al.partnerHour !== undefined ? al.partnerHour : al.hour;
      const pConf = al.partnerConfirmed || false;
      const oConf = al.confirmed || false;

      routes.push({ type: 'own', name: "自家執飛航班(Own)", days: al.days, tz: al.tz, hour: al.hour, confirmed: oConf });
      routes.push({ type: 'partner', name: "外家/聯盟夥伴(Partner)", days: pDays, tz: pTz, hour: pHour, confirmed: pConf });

      globalConfig = [];
      const resBox = document.getElementById('result-card');
      let resultHtml = "";

      routes.forEach((route, rIdx) => {
          const releaseDate = new Date(year, parseInt(month) - 1, day);
          releaseDate.setDate(releaseDate.getDate() - route.days);
          
          const rYear = releaseDate.getFullYear();
          const rMonth = releaseDate.getMonth();
          const rDay = releaseDate.getDate();
          
          const absoluteRelease = getTZTime(rYear, rMonth, rDay, route.tz === 'UTC' ? 'UTC' : route.tz, route.hour || 0);
          
          const prevLocalDay = new Date(releaseDate);
          if ((route.hour || 0) === 0) {
            prevLocalDay.setDate(releaseDate.getDate() - 1);
            var hqStr = `${prevLocalDay.getFullYear()}-${pad(prevLocalDay.getMonth()+1)}-${pad(prevLocalDay.getDate())} 23:59:59\\n   (即 ${rYear}-${pad(rMonth+1)}-${pad(rDay)} 凌晨 00:00)`;
          } else {
            var hqStr = `${rYear}-${pad(rMonth+1)}-${pad(rDay)} 當地時間 ${pad(route.hour)}:00 整`;
          }

          const twStr = formatToYMDHMS(absoluteRelease, 'Asia/Taipei');
          const localStr = formatToYMDHMS(absoluteRelease);

          globalConfig.push({ departureVal, absoluteRelease, al, route });

          let hqLabel = route.tz === 'UTC' ? 'UTC' : route.tz.split('/')[1].replace('_',' ');
          
          let routeHeader = `✨ 航線規則：【${route.name}】\n`;
          let routeIcon = route.type === 'own' ? '✈️' : '🤝';

          let blockStyle = route.type === 'own' ? 
            'border-top: 3px solid rgba(56, 189, 248, 0.4); background: linear-gradient(to bottom, rgba(56,189,248,0.08), transparent); padding: 1.5rem; border-radius: 12px; margin-top: 1.5rem;' : 
            'border-top: 3px solid rgba(167, 139, 250, 0.4); background: linear-gradient(to bottom, rgba(167,139,250,0.08), transparent); padding: 1.5rem; border-radius: 12px; margin-top: 1.5rem;';

          if (rIdx === 0) blockStyle = blockStyle.replace('margin-top: 1.5rem;', 'margin-top: 0;');

          resultHtml += `
<div class="route-block" style="${blockStyle}">
<pre>${routeIcon} ${routeHeader}--------------------------------------------------
🎯 目標出發日期: ${departureVal}
--------------------------------------------------
📍 ${hqLabel} 當地 (HQ): 
   ${hqStr}
📍 換算 台灣時間 (TW): 
   ${twStr}
📍 換算 您的電腦時間: 
   ${localStr}</pre>
<button class="btn-ics" onclick="handleGenerateICS(${rIdx})">📥 產生專屬行事曆提醒 (.ics檔)</button>
</div>`;
      });

      resBox.innerHTML = resultHtml;
      resBox.style.display = 'block';
    }

    function handleGenerateICS(rIdx) {
      if (!globalConfig || !globalConfig[rIdx]) return;
      const { departureVal, absoluteRelease, al, route } = globalConfig[rIdx];
      
      const dtStart = absoluteRelease.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
      const dtEnd = new Date(absoluteRelease.getTime() + 30*60000).toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
      const nowUtc = new Date().toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
      const uid = Math.random().toString(36).substring(2) + "@" + al.id + ".reminder";

      let descLines = route.icsDesc || al.icsDesc || `依經驗各熱門艙等數量有限，請準時搶票。`;
      if (al.note && !route.icsDesc && !al.icsDesc) {
        descLines = al.note.replace(/<br\/>/g, '\\n').replace(/<[^>]*>?/gm, '');
      }

      let routeTag = route.name ? ` [${route.name}]` : '';

      const icsString = `BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//Global Airlines Award//Web//
CALSCALE:GREGORIAN
BEGIN:VEVENT
UID:${uid}
DTSTAMP:${nowUtc}
DTSTART:${dtStart}
DTEND:${dtEnd}
SUMMARY:搶 ${al.name}${routeTag} 機票 (${departureVal})
DESCRIPTION:準備搶 ${al.name} 遠期機票\\n\\n起飛日期: ${departureVal}\\n規則: 提前 ${route.days} 天\\n\\n機位資訊與規律：\\n${descLines}
BEGIN:VALARM
TRIGGER:-PT15M
ACTION:DISPLAY
DESCRIPTION:準點即將放票！(15分鐘後機票釋出)
END:VALARM
END:VEVENT
END:VCALENDAR`;

      const blob = new Blob([icsString], { type: 'text/calendar;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `award_${al.id}_${departureVal.replace(/-/g, '')}.ics`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
