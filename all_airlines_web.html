<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Global Airlines Award Release Hub</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --primary: #f43f5e;
      --primary-hover: #e11d48;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #facc15;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-color);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      background-image: 
        radial-gradient(at 0% 0%, rgba(244, 63, 94, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(250, 204, 21, 0.1) 0px, transparent 50%);
    }
    .container {
      width: 90%;
      max-width: 650px;
      margin-top: 5vmin;
      margin-bottom: 5vmin;
      padding: 2rem;
      background: var(--card-bg);
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    h1 {
      font-size: 1.6rem;
      margin-bottom: 0.5rem;
      text-align: center;
      color: #fff;
    }
    p {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .status-box {
      margin: 1.5rem 0;
      padding: 1.5rem;
      background: rgba(250, 204, 21, 0.08);
      border-left: 4px solid var(--accent);
      border-radius: 8px;
    }
    .status-box p {
      text-align: left;
      margin: 0.4rem 0;
      color: var(--text-main);
      font-size: 1rem;
      line-height: 1.6;
    }
    .status-box strong {
      color: var(--accent);
      font-size: 1.1rem;
    }
    label {
      display: block;
      margin-top: 1.2rem;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    select, input[type="date"] {
      width: 100%;
      box-sizing: border-box;
      padding: 1rem;
      font-size: 1.05rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.6);
      color: var(--text-main);
      color-scheme: dark;
      transition: border-color 0.2s;
    }
    select:focus, input[type="date"]:focus {
      outline: none;
      border-color: var(--primary);
    }
    .btn-calc {
      margin-top: 2rem;
      width: 100%;
      padding: 1rem;
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--primary-hover));
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(244, 63, 94, 0.3);
      transition: transform 0.1s, box-shadow 0.2s;
    }
    .btn-calc:hover {
      box-shadow: 0 6px 20px rgba(244, 63, 94, 0.4);
    }
    .btn-calc:active {
      transform: scale(0.98);
    }
    .result-card {
      margin-top: 2rem;
      padding: 1.5rem;
      background: rgba(15, 23, 42, 0.8);
      border-radius: 12px;
      border: 1px solid rgba(244, 63, 94, 0.3);
      display: none;
    }
    pre {
      font-family: inherit;
      white-space: pre-wrap;
      color: var(--text-main);
      font-size: 0.92rem;
      line-height: 1.6;
      margin: 0;
    }
    .route-block {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px dashed rgba(255,255,255,0.2);
    }
    .route-block:first-child {
      margin-top: 0;
      padding-top: 0;
      border-top: none;
    }
    .btn-ics {
      margin-top: 1rem;
      width: 100%;
      padding: 0.8rem;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-ics:hover {
      background: rgba(255, 255, 255, 0.25);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🌍 全球航空常客計畫 哩程放票推算器</h1>
    <p>統整全球各大航空，精準跨國時區自動轉換</p>

    <label for="airline">選擇航空公司 / 哩程計畫</label>
    <select id="airline" onchange="handleAirlineChange()"></select>

    <div class="status-box" id="info-box" style="display: none;"></div>

    <label for="departure">設定目標出發日期 (去程)</label>
    <input type="date" id="departure" />
    <button class="btn-calc" onclick="handleCalculate()">立即推算精確放票時間</button>

    <div class="result-card" id="result-card"></div>
  </div>

  <script>
    // 全面轉換為支援「自家航班(Own)」與「夥伴航空(Partner)」的雙軌引擎
    // 若 confirmed 狀態不同，引擎亦會自動判定需拆分顯示。
    const airlines = [
      // === 星空聯盟 (Star Alliance) ===
      { alliance: "星空聯盟 (Star Alliance)", id: "br", name: "EVA Air 長榮航空 (Infinity MileageLands)", days: 360, tz: "Asia/Taipei", hour: 8, confirmed: true },
      { alliance: "星空聯盟 (Star Alliance)", id: "oz", name: "Asiana Club", days: 361, tz: "Asia/Seoul", hour: 0 },
      { alliance: "星空聯盟 (Star Alliance)", id: "av", name: "Avianca Lifemiles", days: 360, tz: "UTC", hour: 0, note: "自家放票時間為每天 UTC 00:00。" },
      { alliance: "星空聯盟 (Star Alliance)", id: "lh", name: "Lufthansa Miles & More", days: 360, tz: "Europe/Berlin", hour: 0, note: "只會在出發日前 15 日之內，釋出頭等艙哩程機位給予夥伴航空計畫兌換。" },
      { alliance: "星空聯盟 (Star Alliance)", id: "ac", name: "Air Canada Aeroplan", days: 355, tz: "America/Toronto", hour: 0 },
      { alliance: "星空聯盟 (Star Alliance)", id: "nh", name: "All Nippon Airways (ANA)", days: 355, tz: "Asia/Tokyo", hour: 9, confirmed: false,
        partnerDays: 356, partnerHour: 0, partnerConfirmed: false,
        note: "ANA 自家執飛與聯盟夥伴航空的開放天數不同。如果搜尋發現日期推算更前面，通常是看到聯盟夥伴航空的位置。", 
        icsDesc: "ANA 經驗張數：\\n頭等艙：2張 (如SFO/ORD) 或 1-2張(JFK)\\n商務艙：1-2張\\n經濟艙：2-4張"
      },
      { alliance: "星空聯盟 (Star Alliance)", id: "sq", name: "Singapore Airlines KrisFlyer", days: 355, tz: "Asia/Singapore", hour: 8, 
        note: "例外提醒：美國出發回新加坡航班會依美國當地午夜釋出(如EST及PST會影響幾個小時的偏移)。<br/><br/>長程商務/頭等幾乎僅限自家會員兌換。"
      },
      { alliance: "星空聯盟 (Star Alliance)", id: "ua", name: "United MileagePlus", days: 337, tz: "America/Chicago", hour: 0 },
      
      // === 天合聯盟 (SkyTeam) ===
      { alliance: "天合聯盟 (SkyTeam)", id: "ci", name: "China Airlines 中華航空 (Dynasty Flyer)", days: 361, tz: "Asia/Taipei", hour: 8, confirmed: true },
      { alliance: "天合聯盟 (SkyTeam)", id: "ke", name: "Korean Air SkyPass", days: 361, tz: "Asia/Seoul", hour: 0 },
      { alliance: "天合聯盟 (SkyTeam)", id: "af", name: "Air France-KLM Flying Blue", days: 359, tz: "Europe/Paris", hour: 0, note: "放票時間：巴黎當地 00:00。<br/>通常釋出較多機位，優先保留給自家的「藍天飛行計劃」(Flying Blue) 會員。" },
      { alliance: "天合聯盟 (SkyTeam)", id: "dl", name: "Delta SkyMiles", days: 331, tz: "America/New_York", hour: 0 },
      { alliance: "天合聯盟 (SkyTeam)", id: "vs", name: "Virgin Atlantic Flying Club", days: 331, tz: "Europe/London", hour: 5, note: "放票時間：英國時間 (GMT/BST) 凌晨 05:00 釋出。" },

      // === 寰宇一家 (Oneworld) ===
      { alliance: "寰宇一家 (Oneworld)", id: "ay", name: "Finnair Plus", days: 361, tz: "Europe/Helsinki", hour: 0 },
      { alliance: "寰宇一家 (Oneworld)", id: "qr", name: "Qatar Airways Privilege Club", days: 361, tz: "Asia/Qatar", hour: 0 },
      { alliance: "寰宇一家 (Oneworld)", id: "cx", name: "Cathay Pacific Asia Miles", days: 360, tz: "Asia/Hong_Kong", hour: 8, confirmed: false, partnerConfirmed: true, note: "經實測：聯盟夥伴機位於香港時間 08:00 放票(已確認)；但自家兌換目前尚無法窺見票池，時點未能完全確認。" },
      { alliance: "寰宇一家 (Oneworld)", id: "jl", name: "Japan Airlines Mileage Bank (JAL)", days: 360, tz: "Asia/Tokyo", hour: 10, confirmed: false, 
        note: "經測試自家執飛與聯盟航空皆為 360 天。<br/>推算為每日日本時間 10:00 (台灣 09:00)。<br/><br/>[規律]<br/>超過 354 天：原則固定釋出 1 個頭等艙。<br/>46~353 天：頭等每 14 天出現。<br/>離出發兩週內：釋出剩餘里程機位。<br/>[預訂截止時間]<br/>網站需 48H 前；電話 24H 前完成。" 
      },
      { alliance: "寰宇一家 (Oneworld)", id: "ba", name: "British Airways Executive Club", days: 355, tz: "Europe/London", hour: 0 },
      { alliance: "寰宇一家 (Oneworld)", id: "qf", name: "Qantas Frequent Flyer", days: 353, tz: "Australia/Sydney", hour: 0 },
      { alliance: "寰宇一家 (Oneworld)", id: "as", name: "Alaska Mileage Plan", days: 331, tz: "America/Los_Angeles", hour: 0, confirmed: true, note: "備註：原330天，嚴格推算互換為331天。" },
      { alliance: "寰宇一家 (Oneworld)", id: "aa", name: "American AAdvantage", days: 331, tz: "America/Chicago", hour: 0 },
      { alliance: "寰宇一家 (Oneworld)", id: "ib", name: "Iberia Plus", days: 330, tz: "Europe/Madrid", hour: 0 },

      // === 獨立 / 其他 (Non-Alliance) ===
      { alliance: "獨立計畫 / 其他", id: "jx", name: "Starlux Airlines 星宇航空 (COSMILE)", days: 360, tz: "Asia/Taipei", hour: 8, confirmed: true },
      { alliance: "獨立計畫 / 其他", id: "ey", name: "Etihad Guest", days: 330, tz: "Asia/Dubai", hour: 0 },
      { alliance: "獨立計畫 / 其他", id: "ha", name: "Hawaiian Airlines", days: 330, tz: "Pacific/Honolulu", hour: 0 },
      { alliance: "獨立計畫 / 其他", id: "ek", name: "Emirates Skywards", days: 328, tz: "Asia/Dubai", hour: 0, note: "並不會釋出頭等艙機位給予除了澳洲航空 (Qantas) 以外的合作夥伴航空，透過自家哩程計畫兌換機會最高。" }
    ];

    function pad(num) { return String(num).padStart(2, '0'); }

    // 時區轉換演算法 (完美處理夏令/冬令)
    function getTZTime(year, monthIndex, day, timeZone, targetHour) {
      let guess = new Date(Date.UTC(year, monthIndex, day, 12, 0, 0));
      let parts = new Intl.DateTimeFormat('en-US', {
        timeZone: timeZone, 
        timeZoneName: 'longOffset',
      }).formatToParts(guess);
      let tzOffsetStr = parts.find(p => p.type === 'timeZoneName').value;
      let offsetHours = 0, offsetMinutes = 0;
      if (tzOffsetStr !== "GMT") {
         const match = tzOffsetStr.match(/GMT([+-])(\d+):(\d+)/);
         if (match) {
            let sign = match[1] === '-' ? -1 : 1;
            offsetHours = parseInt(match[2], 10) * sign;
            offsetMinutes = parseInt(match[3], 10) * sign;
         }
      }
      return new Date(Date.UTC(year, monthIndex, day, targetHour - offsetHours, -offsetMinutes, 0));
    }

    function formatToYMDHMS(d, tz) {
      const options = { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
      if(tz) options.timeZone = tz;
      let s = new Intl.DateTimeFormat('en-CA', options).format(d);
      s = s.replace(',', '');
      if(s.includes(' 24:')) s = s.replace(' 24:', ' 00:');
      return s;
    }

    window.onload = function() {
      const sel = document.getElementById('airline');
      let html = '<option value="" disabled selected>請選擇一家航空...</option>';
      let currentAlliance = "";
      airlines.forEach((al, index) => {
        if (al.alliance !== currentAlliance) {
          if (currentAlliance !== "") html += `</optgroup>`;
          currentAlliance = al.alliance;
          html += `<optgroup label="${currentAlliance}">`;
        }
        html += `<option value="${index}">${al.name} (${al.days} 天)</option>`;
      });
      if (currentAlliance !== "") html += `</optgroup>`;
      sel.innerHTML = html;
    };

    function handleAirlineChange() {
      const idx = document.getElementById('airline').value;
      if(idx === "") return;
      const al = airlines[idx];
      const infoEl = document.getElementById('info-box');
      
      let noteHtml = al.note ? `<div style="margin-top:1.5rem;font-size:0.95em;color:#fcd34d;background:rgba(255,255,255,0.05);padding:1rem;border-radius:12px;line-height:1.6;"><strong>💡 深度經驗與備註</strong><br/>${al.note}</div>` : '';

      // 解析自營 vs 夥伴邏輯
      const routes = [];
      const pDays = al.partnerDays || al.days;
      const pTz   = al.partnerTz || al.tz;
      const pHour = al.partnerHour !== undefined ? al.partnerHour : al.hour;
      const pConf = al.partnerConfirmed !== undefined ? al.partnerConfirmed : (al.confirmed || false);

      // 當包含精確度(confirmed)在內的所有屬性都相等時，才合併顯示
      if (pDays === al.days && pTz === al.tz && pHour === al.hour && pConf === (al.confirmed || false)) {
         routes.push({ name: "自家執飛 與 聯盟夥伴航空 (發放規則一致)", days: al.days, tz: al.tz, hour: al.hour, confirmed: al.confirmed || false });
      } else {
         routes.push({ name: "自家執飛航班 (Own Metal)", days: al.days, tz: al.tz, hour: al.hour, confirmed: al.confirmed || false });
         routes.push({ name: "聯盟夥伴航空 (Partner Airlines)", days: pDays, tz: pTz, hour: pHour, confirmed: pConf });
      }

      let innerContent = `<strong>${al.name}</strong><br/>`;
      innerContent += noteHtml;

      routes.forEach((route, rIdx) => {
          let routeLabel = `<div style="margin-top:1.5rem; margin-bottom:0.5rem; padding:0.4rem 0.8rem; background:rgba(244,63,94,0.2); border-radius:6px; color:#fecdd3; font-weight:bold; display:inline-block;">🏷️ ${route.name}</div>`;
          
          let confirmedHtml = route.confirmed ? 
            `<span style="display:inline-block; margin-left:8px; margin-bottom:4px; padding:2px 8px; background:rgba(16, 185, 129, 0.15); color:#34d399; border-radius:6px; font-size:0.75em; border:1px solid rgba(16,185,129,0.3);">✅ 已確認精確時點</span>` : 
            `<span style="display:inline-block; margin-left:8px; margin-bottom:4px; padding:2px 8px; background:rgba(244, 63, 94, 0.15); color:#fb7185; border-radius:6px; font-size:0.75em; border:1px solid rgba(244,63,94,0.3);">⚠️ 依經驗約略推估</span>`;

          // 動態推算目前最新放票狀態
          let tzDateStr = new Date().toLocaleString('en-US', {timeZone: route.tz === 'UTC' ? 'UTC' : route.tz});
          let ptDate = new Date(tzDateStr);
          let hqYear = ptDate.getFullYear();
          let hqMonth = ptDate.getMonth();
          let hqDay = ptDate.getDate();
          
          let targetHour = route.hour || 0;
          let todaysReleaseAbs = getTZTime(hqYear, hqMonth, hqDay, route.tz === 'UTC' ? 'UTC' : route.tz, targetHour);
          
          let latestReleaseBaseDay, nextReleaseBaseDay, nextReleaseAbs;
          if (Date.now() >= todaysReleaseAbs.getTime()) {
            latestReleaseBaseDay = new Date(hqYear, hqMonth, hqDay);
            nextReleaseBaseDay = new Date(hqYear, hqMonth, hqDay + 1);
            nextReleaseAbs = getTZTime(hqYear, hqMonth, hqDay + 1, route.tz === 'UTC' ? 'UTC' : route.tz, targetHour);
          } else {
            latestReleaseBaseDay = new Date(hqYear, hqMonth, hqDay - 1);
            nextReleaseBaseDay = new Date(hqYear, hqMonth, hqDay);
            nextReleaseAbs = todaysReleaseAbs;
          }
          
          let bookableFlight = new Date(latestReleaseBaseDay);
          bookableFlight.setDate(bookableFlight.getDate() + route.days);
          
          let nextBatchFlight = new Date(nextReleaseBaseDay);
          nextBatchFlight.setDate(nextBatchFlight.getDate() + route.days);
          
          let nextTwStr = formatToYMDHMS(nextReleaseAbs, 'Asia/Taipei');

          let shortTzStr = route.tz;
          if (route.tz !== 'UTC') {
            let shortTzParts = new Intl.DateTimeFormat('en-US', {timeZone: route.tz, timeZoneName: 'short'}).formatToParts(nextReleaseAbs);
            shortTzStr = shortTzParts.find(p => p.type === 'timeZoneName')?.value || route.tz.split('/')[1];
          }

          innerContent += `
            ${routeLabel} ${confirmedHtml}<br/>
            推算基準：提早 <strong>${route.days}</strong> 天 <br/>
            換算時區範圍：<strong>${route.tz.replace('_', ' ')}</strong> 當地 <strong>${pad(targetHour)}:00</strong> (當地季節縮寫：${shortTzStr})
            
            <div style="margin-top: 0.8rem; padding-top: 0.8rem; border-top: 1px dashed rgba(255,255,255,0.15);">
                👉 此刻最遠可訂：<br/>
                <strong style="color:white; font-size:1.1em;">${bookableFlight.getFullYear()}-${pad(bookableFlight.getMonth()+1)}-${pad(bookableFlight.getDate())}</strong><br/><br/>
                <span style="color:var(--text-muted); font-size: 0.85em;">(下波在台灣時間 ${nextTwStr} 釋出 ${nextBatchFlight.getFullYear()}-${pad(nextBatchFlight.getMonth()+1)}-${pad(nextBatchFlight.getDate())} )</span>
            </div>
          `;
      });

      infoEl.innerHTML = innerContent;
      infoEl.style.display = 'block';
      document.getElementById('result-card').style.display = 'none';
    }

    let globalConfig = [];

    function handleCalculate() {
      const idx = document.getElementById('airline').value;
      const departureVal = document.getElementById('departure').value;
      if(idx === "" || !departureVal) {
        alert("請確認已選擇航空公司並填寫目標出發日期！");
        return;
      }
      
      const al = airlines[idx];
      const [year, month, day] = departureVal.split('-');
      
      const routes = [];
      const pDays = al.partnerDays || al.days;
      const pTz   = al.partnerTz || al.tz;
      const pHour = al.partnerHour !== undefined ? al.partnerHour : al.hour;
      const pConf = al.partnerConfirmed !== undefined ? al.partnerConfirmed : (al.confirmed || false);

      if (pDays === al.days && pTz === al.tz && pHour === al.hour && pConf === (al.confirmed || false)) {
         routes.push({ name: "自家與聯盟夥伴", days: al.days, tz: al.tz, hour: al.hour, confirmed: al.confirmed || false });
      } else {
         routes.push({ name: "自家執飛(Own)", days: al.days, tz: al.tz, hour: al.hour, confirmed: al.confirmed || false });
         routes.push({ name: "聯盟夥伴(Partner)", days: pDays, tz: pTz, hour: pHour, confirmed: pConf });
      }

      globalConfig = [];
      const resBox = document.getElementById('result-card');
      let resultHtml = "";

      routes.forEach((route, rIdx) => {
          const releaseDate = new Date(year, parseInt(month) - 1, day);
          releaseDate.setDate(releaseDate.getDate() - route.days);
          
          const rYear = releaseDate.getFullYear();
          const rMonth = releaseDate.getMonth();
          const rDay = releaseDate.getDate();
          
          const absoluteRelease = getTZTime(rYear, rMonth, rDay, route.tz === 'UTC' ? 'UTC' : route.tz, route.hour || 0);
          
          const prevLocalDay = new Date(releaseDate);
          if ((route.hour || 0) === 0) {
            prevLocalDay.setDate(releaseDate.getDate() - 1);
            var hqStr = `${prevLocalDay.getFullYear()}-${pad(prevLocalDay.getMonth()+1)}-${pad(prevLocalDay.getDate())} 23:59:59\\n   (即 ${rYear}-${pad(rMonth+1)}-${pad(rDay)} 凌晨 00:00)`;
          } else {
            var hqStr = `${rYear}-${pad(rMonth+1)}-${pad(rDay)} 當地時間 ${pad(route.hour)}:00 整`;
          }

          const twStr = formatToYMDHMS(absoluteRelease, 'Asia/Taipei');
          const localStr = formatToYMDHMS(absoluteRelease);

          globalConfig.push({ departureVal, absoluteRelease, al, route });

          let hqLabel = route.tz === 'UTC' ? 'UTC' : route.tz.split('/')[1].replace('_',' ');
          
          let routeHeader = `✨ 航線規則：【${route.name}】\n`;

          resultHtml += `
<div class="route-block">
<pre>${routeHeader}--------------------------------------------------
🎯 目標出發日期: ${departureVal}
--------------------------------------------------
📍 ${hqLabel} 當地 (HQ): 
   ${hqStr}
📍 換算 台灣時間 (TW): 
   ${twStr}
📍 換算 您的電腦時間: 
   ${localStr}</pre>
<button class="btn-ics" onclick="handleGenerateICS(${rIdx})">📥 產生專屬行事曆提醒 (.ics檔)</button>
</div>`;
      });

      resBox.innerHTML = resultHtml;
      resBox.style.display = 'block';
    }

    function handleGenerateICS(rIdx) {
      if (!globalConfig || !globalConfig[rIdx]) return;
      const { departureVal, absoluteRelease, al, route } = globalConfig[rIdx];
      
      const dtStart = absoluteRelease.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
      const dtEnd = new Date(absoluteRelease.getTime() + 30*60000).toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
      const nowUtc = new Date().toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
      const uid = Math.random().toString(36).substring(2) + "@" + al.id + ".reminder";

      let descLines = route.icsDesc || al.icsDesc || `依經驗各熱門艙等數量有限，請準時搶票。`;
      if (al.note && !route.icsDesc && !al.icsDesc) {
        descLines = al.note.replace(/<br\/>/g, '\\n').replace(/<[^>]*>?/gm, '');
      }

      let routeTag = route.name ? ` [${route.name}]` : '';

      const icsString = `BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//Global Airlines Award//Web//
CALSCALE:GREGORIAN
BEGIN:VEVENT
UID:${uid}
DTSTAMP:${nowUtc}
DTSTART:${dtStart}
DTEND:${dtEnd}
SUMMARY:搶 ${al.name}${routeTag} 機票 (${departureVal})
DESCRIPTION:準備搶 ${al.name} 遠期機票\\n\\n起飛日期: ${departureVal}\\n規則: 提前 ${route.days} 天\\n\\n機位資訊與規律：\\n${descLines}
BEGIN:VALARM
TRIGGER:-PT15M
ACTION:DISPLAY
DESCRIPTION:準點即將放票！(15分鐘後機票釋出)
END:VALARM
END:VEVENT
END:VCALENDAR`;

      const blob = new Blob([icsString], { type: 'text/calendar;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `award_${al.id}_${departureVal.replace(/-/g, '')}.ics`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
